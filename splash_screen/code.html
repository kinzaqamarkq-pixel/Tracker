<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium Finance - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006c75",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark flex flex-col items-center justify-between min-h-screen font-display">
<!-- Top Spacing -->
<div class="flex-1"></div>
<!-- Main Branding Section -->
<div class="flex flex-col items-center justify-center">
<!-- Abstract Geometric Logo Container -->
<div class="relative w-32 h-32 md:w-40 md:h-40 flex items-center justify-center">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
<!-- Logo Visual -->
<div class="relative z-10 flex items-center justify-center">
<div class="w-24 h-24 bg-primary rounded-xl rotate-45 flex items-center justify-center shadow-xl shadow-primary/30">
<div class="w-12 h-12 border-4 border-white/40 rounded-lg -rotate-45"></div>
<div class="absolute w-6 h-6 bg-white/90 rounded-sm -rotate-45"></div>
</div>
</div>
</div>
<!-- App Name -->
<div class="mt-12 text-center">
<h1 class="text-3xl font-light tracking-[0.2em] text-slate-900 dark:text-slate-100 uppercase">
                EQUITY
            </h1>
<div class="h-1 w-8 bg-primary mx-auto mt-2 rounded-full"></div>
</div>
</div>
<!-- Bottom Slogan Section -->
<div class="flex-1 flex flex-col justify-end pb-16">
<div class="flex flex-col items-center space-y-8">
<!-- Subtle Loading Indicator -->
<div class="flex space-x-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/60"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
</div>
<!-- Slogan -->
<p class="text-primary text-sm font-medium tracking-widest uppercase opacity-80">
                Financially Yours
            </p>
</div>
</div>
<!-- Decorative Top Bar (Optional Component Integration) -->
<div class="fixed top-0 w-full px-4 pt-4">
<div class="flex justify-between items-center opacity-40">
<span class="text-xs font-semibold text-slate-900 dark:text-slate-100">9:41</span>
<div class="flex space-x-1 items-center">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm">battery_full</span>
</div>
</div>
</div>
</body></html>
